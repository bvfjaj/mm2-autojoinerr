<!DOCTYPE html>
<html>
<head>
    <title>Redirecting to Roblox...</title>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const placeId = urlParams.get('placeId');
            const jobId = urlParams.get('gameInstanceId');

            if (placeId && jobId) {
                // The magic protocol that opens the Roblox App
                window.location.href = "roblox://experiences/start?placeId=" + placeId + "&gameInstanceId=" + jobId;
                
                // Backup: Redirect to the game page if the app doesn't open
                setTimeout(function() {
                    window.location.href = "https://www.roblox.com/games/" + placeId;
                }, 2000);
            } else {
                document.body.innerHTML = "<h1>Invalid Link: Missing PlaceId or JobId</h1>";
            }
        };
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #111; color: white; }
    </style>
</head>
<body>
    <h1>Launching Roblox...</h1>
    <p>If the app doesn't open, click <a href="#" style="color: cyan;">here</a>.</p>
</body>
</html>
